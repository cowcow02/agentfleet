name: Test

on: [push, pull_request]

jobs:
  types-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - name: Typecheck
        run: pnpm --filter @agentfleet/types typecheck
      - name: Run tests
        run: pnpm --filter @agentfleet/types test

  api-tests:
    runs-on: ubuntu-latest
    needs: types-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agentfleet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - name: Typecheck
        run: pnpm --filter @agentfleet/api typecheck
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/agentfleet_test
        run: pnpm --filter @agentfleet/api test

  web-tests:
    runs-on: ubuntu-latest
    needs: types-tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - name: Run tests
        run: pnpm --filter web test
      - name: Build
        run: pnpm --filter web build
