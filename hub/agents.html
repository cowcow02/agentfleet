<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agents — AgentFleet</title>
<style>
  :root {
    --bg: #0f1117; --surface: #161922; --surface-hover: #1c1f2e; --surface-elevated: #1e2235;
    --border: #262b3d; --border-subtle: #1f2335;
    --text: #e1e4ed; --text-secondary: #8b90a0; --text-tertiary: #5c6070;
    --accent: #7c6cf0; --accent-hover: #8d7ff5; --accent-subtle: rgba(124, 108, 240, 0.12);
    --success: #3ecf8e; --success-subtle: rgba(62, 207, 142, 0.12);
    --warning: #f0b429; --warning-subtle: rgba(240, 180, 41, 0.12);
    --danger: #e5484d; --danger-subtle: rgba(229, 72, 77, 0.12);
    --info: #5b9bf0; --info-subtle: rgba(91, 155, 240, 0.12);
    --sidebar-width: 220px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* Sidebar */
  .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--surface); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; z-index: 100; }
  .sidebar-brand { padding: 24px 20px 20px; display: flex; align-items: center; gap: 10px; }
  .sidebar-brand svg { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
  .sidebar-brand-text { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .sidebar-nav { flex: 1; padding: 4px 10px; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .sidebar-nav a:hover { background: var(--surface-hover); color: var(--text); }
  .sidebar-nav a.active { background: var(--accent-subtle); color: var(--accent); }
  .sidebar-nav a svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .sidebar-nav a.active svg { opacity: 1; }
  .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-subtle); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sidebar-avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-subtle); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .sidebar-user-info { overflow: hidden; }
  .sidebar-user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-team { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-logout { display: block; width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 7px 0; font-family: inherit; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .sidebar-logout:hover { color: var(--danger); border-color: var(--danger-subtle); }

  /* Main */
  .main { margin-left: var(--sidebar-width); padding: 32px 40px; min-height: 100vh; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .page-header .count { font-size: 13px; color: var(--text-secondary); }

  /* Toolbar */
  .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
  .search-wrapper { position: relative; width: 320px; }
  .search-wrapper svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-tertiary); pointer-events: none; }
  .search-wrapper input { width: 100%; padding-left: 40px; }
  input, select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.15s; outline: none; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
  input::placeholder { color: var(--text-tertiary); }
  select { cursor: pointer; }

  /* Table */
  .agent-table { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; overflow: hidden; margin-bottom: 28px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .table-header { display: grid; grid-template-columns: 40px 1.2fr 1fr 1fr 1.5fr 0.6fr; gap: 12px; padding: 14px 20px; background: var(--surface-elevated); border-bottom: 1px solid var(--border-subtle); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); align-items: center; }
  .table-body { max-height: calc(100vh - 380px); overflow-y: auto; }
  .table-row { display: grid; grid-template-columns: 40px 1.2fr 1fr 1fr 1.5fr 0.6fr; gap: 12px; padding: 14px 20px; min-height: 48px; border-bottom: 1px solid var(--border-subtle); align-items: center; transition: background 0.1s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface-hover); }
  .status-cell { display: flex; align-items: center; justify-content: center; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.online { background: var(--success); box-shadow: 0 0 0 3px var(--success-subtle); }
  .status-dot.busy { background: var(--warning); box-shadow: 0 0 0 3px var(--warning-subtle); }
  .status-dot.offline { background: var(--text-tertiary); }
  .machine-cell .machine-name { font-weight: 600; font-size: 13px; }
  .machine-cell .machine-status { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
  .machine-cell .status-text.online { color: var(--success); font-weight: 500; }
  .machine-cell .status-text.busy { color: var(--warning); font-weight: 500; }
  .machine-cell .status-text.offline { color: var(--text-tertiary); font-weight: 500; }
  .member-cell { font-size: 13px; }
  .agent-cell .agent-name { font-weight: 600; font-size: 13px; }
  .agent-cell .agent-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .tags-cell { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 100px; border: none; }
  .tag.backend, .tag.be, .tag.api { background: var(--info-subtle); color: var(--info); }
  .tag.frontend, .tag.fe { background: var(--accent-subtle); color: var(--accent); }
  .tag.bug { background: var(--danger-subtle); color: var(--danger); }
  .tag.feature { background: var(--success-subtle); color: var(--success); }
  .tag.question, .tag.explore, .tag.refactor { background: rgba(34,211,238,0.1); color: #5cc8db; }
  .tag.simple { background: var(--warning-subtle); color: var(--warning); }
  .tag-default { background: rgba(139,144,160,0.1); color: var(--text-secondary); }
  .capacity-cell { font-size: 13px; color: var(--text-secondary); text-align: center; font-feature-settings: 'tnum'; }
  .capacity-cell .used { color: var(--warning); font-weight: 600; }
  .capacity-cell .idle { color: var(--success); font-weight: 600; }

  /* Setup */
  .setup-panel { background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
  .setup-panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .setup-panel p { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
  .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; font-size: 13px; color: var(--success); margin-bottom: 10px; }
  .code-block .prompt { color: var(--text-tertiary); margin-right: 8px; }
  .empty { text-align: center; padding: 48px 32px; color: var(--text-tertiary); font-size: 13px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><span class="sidebar-brand-text">AgentFleet</span></div>
  <nav class="sidebar-nav">
    <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="/agents" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>Agents</a>
    <a href="/dispatches"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>Dispatches</a>
    <a href="/settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="sidebar-avatar" id="user-avatar"></div><div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name"></div><div class="sidebar-user-team" id="user-team"></div></div></div>
    <button onclick="logout()" class="sidebar-logout">Sign out</button>
  </div>
</aside>

<div class="main">
  <div class="page-header"><h1 class="page-title">Agent Registry</h1><span class="count" id="total-count"></span></div>

  <div class="toolbar">
    <div class="search-wrapper">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" placeholder="Search agents, machines, tags..." oninput="renderAgents()">
    </div>
    <select id="filter-status" onchange="renderAgents()">
      <option value="all">All statuses</option><option value="online">Online</option><option value="busy">Busy</option><option value="offline">Offline</option>
    </select>
  </div>

  <div class="agent-table">
    <div class="table-header"><div></div><div>Member</div><div>Agent</div><div>Tags</div><div>Capacity</div></div>
    <div class="table-body" id="agents-body"><div class="empty">Loading agents...</div></div>
  </div>

  <div class="setup-panel">
    <h3>Daemon Setup Instructions</h3>
    <p>To add agents, run on your machine:</p>
    <div class="code-block"><span class="prompt">$</span> npx agentfleet login &lt;your-token&gt;</div>
    <div class="code-block"><span class="prompt">$</span> npx agentfleet start</div>
    <p style="margin-top: 12px; font-size: 12px; color: var(--text-tertiary);">Get your token from <a href="/settings" style="color: var(--accent); text-decoration: none;">Settings &gt; Members</a>.</p>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('agentfleet_session') || localStorage.getItem('agentfleet_token');
const HUB = window.location.origin;
if (!TOKEN) { window.location.href = '/'; }

async function api(path, options = {}) {
  const res = await fetch(`${HUB}${path}`, { ...options, headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...options.headers } });
  return res.json();
}
function logout() { localStorage.removeItem('agentfleet_session'); localStorage.removeItem('agentfleet_token'); window.location.href = '/'; }
function escHtml(s) { if (!s) return ''; const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

api('/api/me').then(data => {
  if (data.error) { logout(); return; }
  const name = data.member?.name || ''; const team = data.team?.name || '';
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-team').textContent = team;
  document.getElementById('user-avatar').textContent = name ? name.charAt(0).toUpperCase() : '?';
}).catch(() => {});

let allAgents = [];
function getAgentStatus(a) { if (!a.online) return 'offline'; if (a.running > 0) return 'busy'; return 'online'; }
function timeAgo(iso) { if (!iso) return ''; const ms = Date.now() - new Date(iso).getTime(); const s = Math.floor(ms / 1000); if (s < 60) return s + 's ago'; const m = Math.floor(s / 60); if (m < 60) return m + 'm ago'; const h = Math.floor(m / 60); if (h < 24) return h + 'h ago'; return Math.floor(h / 24) + 'd ago'; }
function tagClass(tag) { const known = ['backend', 'be', 'api', 'frontend', 'fe', 'bug', 'feature', 'question', 'explore', 'simple', 'refactor']; return known.includes(tag) ? 'tag ' + tag : 'tag tag-default'; }

function renderAgents() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filter = document.getElementById('filter-status').value;
  const container = document.getElementById('agents-body');
  let filtered = allAgents.filter(a => {
    const status = getAgentStatus(a);
    if (filter !== 'all' && status !== filter) return false;
    if (search) { const haystack = [a.name, a.machine, a.memberName, ...(a.tags || [])].join(' ').toLowerCase(); if (!haystack.includes(search)) return false; }
    return true;
  });
  document.getElementById('total-count').textContent = filtered.length + ' of ' + allAgents.length + ' agents';
  if (filtered.length === 0) { container.innerHTML = '<div class="empty">' + (allAgents.length === 0 ? 'No agents registered yet. Follow the setup instructions below.' : 'No agents match your filters.') + '</div>'; return; }
  filtered.sort((a, b) => { const order = { online: 0, busy: 1, offline: 2 }; return (order[getAgentStatus(a)] || 0) - (order[getAgentStatus(b)] || 0); });
  container.innerHTML = filtered.map(a => {
    const status = getAgentStatus(a);
    const statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
    const capClass = a.running > 0 ? 'used' : 'idle';
    return `<div class="table-row"><div class="status-cell"><div class="status-dot ${status}"></div></div><div class="member-cell"><div style="font-weight:600;">${escHtml(a.memberName || '\u2014')}</div><div style="font-size:12px;color:var(--text-tertiary);"><span class="status-text ${status}">${statusLabel}</span></div></div><div class="agent-cell"><div class="agent-name">${escHtml(a.name)}</div><div class="agent-desc">${escHtml(a.description || '')}</div></div><div class="tags-cell">${(a.tags || []).map(t => '<span class="' + tagClass(t) + '">' + escHtml(t) + '</span>').join('')}</div><div class="capacity-cell"><span class="${capClass}">${a.running || 0}</span> / ${a.capacity || 0}</div></div>`;
  }).join('');
}

async function refresh() { try { const data = await api('/api/agents'); allAgents = data.agents || []; renderAgents(); } catch (e) {} }
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
