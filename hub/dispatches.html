<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dispatches — AgentFleet</title>
<style>
  :root {
    --bg: #FDFBF9;
    --surface: #F5F1EC;
    --surface-hover: #EDE8E0;
    --surface-elevated: #E8E2DA;
    --border: #E8E2DA;
    --border-subtle: #F0EBE4;
    --text: #1A1A1A;
    --text-secondary: #6B6560;
    --text-tertiary: #8A8580;
    --accent: #14B8A6;
    --accent-hover: #0D9488;
    --accent-subtle: rgba(20, 184, 166, 0.10);
    --success: #059669;
    --success-subtle: rgba(5, 150, 105, 0.10);
    --warning: #D97706;
    --warning-subtle: rgba(217, 119, 6, 0.10);
    --danger: #C53030;
    --danger-subtle: rgba(197, 48, 48, 0.10);
    --info: #8168E0;
    --info-subtle: rgba(129, 104, 224, 0.10);
    --sidebar-width: 220px;
  }

  [data-theme="dark"] {
    --bg: #222228;
    --surface: #2C2C33;
    --surface-hover: #333340;
    --surface-elevated: #38384A;
    --border: #38383F;
    --border-subtle: #2F2F38;
    --text: #E8E8F0;
    --text-secondary: #9090A0;
    --text-tertiary: #707078;
    --accent: #2DD4BF;
    --accent-hover: #5EEAD4;
    --accent-subtle: rgba(45, 212, 191, 0.12);
    --success: #34D399;
    --success-subtle: rgba(52, 211, 153, 0.12);
    --warning: #FBBF24;
    --warning-subtle: rgba(251, 191, 36, 0.10);
    --danger: #F87171;
    --danger-subtle: rgba(248, 113, 113, 0.12);
    --info: #A78BFA;
    --info-subtle: rgba(167, 139, 250, 0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

  /* Sidebar */
  .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: var(--surface); border-right: 1px solid var(--border-subtle); display: flex; flex-direction: column; z-index: 100; }
  .sidebar-brand { padding: 24px 20px 20px; display: flex; align-items: center; gap: 10px; }
  .sidebar-brand svg { width: 20px; height: 20px; color: var(--accent); flex-shrink: 0; }
  .sidebar-brand-text { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .sidebar-nav { flex: 1; padding: 4px 10px; display: flex; flex-direction: column; gap: 2px; }
  .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .sidebar-nav a:hover { background: var(--surface-hover); color: var(--text); }
  .sidebar-nav a.active { background: var(--accent-subtle); color: var(--accent); }
  .sidebar-nav a svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
  .sidebar-nav a.active svg { opacity: 1; }
  .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-subtle); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .sidebar-avatar { width: 32px; height: 32px; border-radius: 8px; background: var(--accent-subtle); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .sidebar-user-info { overflow: hidden; }
  .sidebar-user-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-user-team { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-logout { display: block; width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 7px 0; font-family: inherit; font-size: 12px; font-weight: 500; border-radius: 6px; cursor: pointer; transition: all 0.15s; text-align: center; }
  .sidebar-logout:hover { color: var(--danger); border-color: var(--danger-subtle); }

  /* Main */
  .main { margin-left: var(--sidebar-width); padding: 32px 40px; min-height: 100vh; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .page-header .count { font-size: 13px; color: var(--text-secondary); }

  /* Toolbar */
  .toolbar { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
  .toolbar-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  select { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; transition: border-color 0.15s; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }

  /* Dispatch cards */
  .dispatch-list { display: flex; flex-direction: column; gap: 12px; }
  .dispatch-card {
    background: var(--surface); border: 1px solid var(--border-subtle); border-radius: 12px;
    padding: 20px 24px; border-left: 4px solid var(--border); transition: all 0.15s;
    box-shadow: none;
  }
  .dispatch-card:hover { border-color: var(--border); }
  .dispatch-card.running { border-left-color: var(--warning); }
  .dispatch-card.completed { border-left-color: var(--success); }
  .dispatch-card.failed { border-left-color: var(--danger); }
  .dispatch-card.dispatched { border-left-color: var(--info); }
  .d-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .d-top-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .d-id { font-size: 11px; color: var(--text-tertiary); background: var(--bg); padding: 3px 10px; border-radius: 6px; font-family: 'SF Mono', monospace; }
  .d-ticket-id { font-weight: 700; font-size: 14px; font-family: 'SF Mono', monospace; }
  .d-title { color: var(--text-secondary); font-size: 14px; }
  .status-badge { font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 100px; text-transform: capitalize; flex-shrink: 0; }
  .status-badge.running { background: var(--warning-subtle); color: var(--warning); }
  .status-badge.completed { background: var(--success-subtle); color: var(--success); }
  .status-badge.failed { background: var(--danger-subtle); color: var(--danger); }
  .status-badge.dispatched { background: var(--info-subtle); color: var(--info); }
  .source-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 100px; }
  .source-badge.manual { background: var(--accent-subtle); color: var(--accent); }
  .source-badge.linear { background: var(--info-subtle); color: var(--info); }
  .d-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .d-meta .agent-name { color: var(--accent); font-weight: 500; }
  .d-duration { font-weight: 600; font-size: 13px; font-feature-settings: 'tnum'; }
  .d-duration.running { color: var(--warning); }
  .d-duration.completed { color: var(--success); }
  .d-duration.failed { color: var(--danger); }
  .d-duration.dispatched { color: var(--info); }

  /* Timeline */
  .timeline-toggle { background: transparent; border: none; color: var(--text-secondary); font-size: 12px; font-family: inherit; font-weight: 500; padding: 10px 0 0; cursor: pointer; transition: color 0.15s; }
  .timeline-toggle:hover { color: var(--text); }
  .timeline { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-subtle); display: none; padding-left: 12px; }
  .timeline.open { display: block; }
  .tl-entry { display: grid; grid-template-columns: 80px 60px 1fr; gap: 10px; padding: 5px 0 5px 16px; font-size: 13px; position: relative; }
  .tl-entry::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--border-subtle); border-radius: 1px; }
  .tl-entry:first-child::before { top: 50%; }
  .tl-entry:last-child::before { bottom: 50%; }
  .tl-entry::after { content: ''; position: absolute; left: -3px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--surface-elevated); border: 2px solid var(--border); z-index: 1; }
  .tl-entry:first-child::after { border-color: var(--info); background: var(--info-subtle); }
  .tl-entry:last-child::after { border-color: var(--success); background: var(--success-subtle); }
  .tl-time { color: var(--text-tertiary); font-family: 'SF Mono', monospace; font-size: 11px; }
  .tl-elapsed { color: var(--text-tertiary); font-family: 'SF Mono', monospace; font-size: 11px; }
  .tl-msg { color: var(--text); word-break: break-word; }

  .empty { text-align: center; padding: 56px 32px; color: var(--text-tertiary); font-size: 13px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .theme-toggle {
    display: flex; align-items: center; justify-content: center;
    width: 100%; background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); padding: 7px 0; border-radius: 6px;
    cursor: pointer; transition: all 0.15s; margin-bottom: 8px;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--text-tertiary); }
  .theme-toggle svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><span class="sidebar-brand-text">AgentFleet</span></div>
  <nav class="sidebar-nav">
    <a href="/dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a href="/agents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>Agents</a>
    <a href="/dispatches" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>Dispatches</a>
    <a href="/settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>Settings</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="sidebar-avatar" id="user-avatar"></div><div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name"></div><div class="sidebar-user-team" id="user-team"></div></div></div>
    <button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle" title="Toggle theme">
      <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <button onclick="logout()" class="sidebar-logout">Sign out</button>
  </div>
</aside>

<div class="main">
  <div class="page-header"><h1 class="page-title">Dispatch History</h1><span class="count" id="total-count"></span></div>

  <div class="toolbar">
    <span class="toolbar-label">Status:</span>
    <select id="filter-status" onchange="renderDispatches()"><option value="all">All</option><option value="running">Running</option><option value="completed">Completed</option><option value="failed">Failed</option><option value="dispatched">Dispatched</option></select>
    <span class="toolbar-label" style="margin-left: 8px;">Source:</span>
    <select id="filter-source" onchange="renderDispatches()"><option value="all">All</option><option value="manual">Manual</option><option value="linear">Linear</option></select>
  </div>

  <div class="dispatch-list" id="dispatch-list"><div class="empty">Loading dispatches...</div></div>
</div>

<script>
(function initTheme() {
  const saved = localStorage.getItem('agentfleet-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('agentfleet-theme')) {
      const t = e.matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      updateThemeIcon(t);
    }
  });
})();
function updateThemeIcon(theme) {
  const sun = document.getElementById('theme-icon-sun');
  const moon = document.getElementById('theme-icon-moon');
  if (sun && moon) {
    sun.style.display = theme === 'dark' ? 'block' : 'none';
    moon.style.display = theme === 'dark' ? 'none' : 'block';
  }
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('agentfleet-theme', next);
  updateThemeIcon(next);
}

const TOKEN = localStorage.getItem('agentfleet_session') || localStorage.getItem('agentfleet_token');
const HUB = window.location.origin;
if (!TOKEN) { window.location.href = '/'; }

async function api(path, options = {}) {
  const res = await fetch(`${HUB}${path}`, { ...options, headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...options.headers } });
  return res.json();
}
function logout() { localStorage.removeItem('agentfleet_session'); localStorage.removeItem('agentfleet_token'); window.location.href = '/'; }
function escHtml(s) { if (!s) return ''; const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }

api('/api/me').then(data => {
  if (data.error) { logout(); return; }
  const name = data.member?.name || ''; const team = data.team?.name || '';
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-team').textContent = team;
  document.getElementById('user-avatar').textContent = name ? name.charAt(0).toUpperCase() : '?';
}).catch(() => {});

let allDispatches = [];
let openTimelines = new Set();

function fmtTime(iso) { if (!iso) return '\u2014'; return new Date(iso).toLocaleTimeString('en-US', { hour12: false }); }

function elapsed(from, to, seconds) {
  let s;
  if (typeof seconds === 'number') { s = seconds; } else { if (!from) return ''; const ms = (new Date(to || Date.now())) - new Date(from); s = Math.floor(ms / 1000); }
  if (s < 0) return '0s'; if (s < 60) return s + 's'; const m = Math.floor(s / 60); if (m < 60) return m + 'm ' + (s % 60) + 's'; const h = Math.floor(m / 60); return h + 'h ' + (m % 60) + 'm';
}

function elapsedFromStart(startIso, iso) {
  if (!startIso || !iso) return '';
  const ms = new Date(iso) - new Date(startIso); const s = Math.floor(ms / 1000);
  if (s < 0) return ''; if (s < 60) return '+' + s + 's'; const m = Math.floor(s / 60); return '+' + m + 'm' + (s % 60) + 's';
}

function toggleTimeline(id) { if (openTimelines.has(id)) openTimelines.delete(id); else openTimelines.add(id); renderDispatches(); }

function renderDispatches() {
  const statusFilter = document.getElementById('filter-status').value;
  const sourceFilter = document.getElementById('filter-source').value;
  const container = document.getElementById('dispatch-list');
  let filtered = allDispatches.filter(d => {
    if (statusFilter !== 'all' && d.status !== statusFilter) return false;
    const source = d.source || 'manual';
    if (sourceFilter !== 'all' && source !== sourceFilter) return false;
    return true;
  });
  filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  document.getElementById('total-count').textContent = filtered.length + ' of ' + allDispatches.length + ' total';
  if (filtered.length === 0) { container.innerHTML = '<div class="empty">' + (allDispatches.length === 0 ? 'No dispatches yet.' : 'No dispatches match your filters.') + '</div>'; return; }

  container.innerHTML = filtered.map(d => {
    const source = d.source || 'manual';
    const isOpen = openTimelines.has(d.dispatch_id);
    const messages = d.messages || [];
    const statusIcon = d.status === 'completed' ? '\u2713' : d.status === 'failed' ? '\u2717' : d.status === 'running' ? '\u25CF' : '\u25CB';

    const timelineEntries = [];
    timelineEntries.push({ time: d.created_at, msg: 'Dispatched', elapsed: '' });
    for (const m of messages) { timelineEntries.push({ time: m.timestamp, msg: m.message, elapsed: elapsedFromStart(d.created_at, m.timestamp) }); }
    if (d.status === 'completed') { timelineEntries.push({ time: d.updated_at, msg: 'Completed', elapsed: elapsedFromStart(d.created_at, d.updated_at) }); }
    else if (d.status === 'failed') { timelineEntries.push({ time: d.updated_at, msg: 'Failed' + (d.exit_code ? ' (exit ' + d.exit_code + ')' : ''), elapsed: elapsedFromStart(d.created_at, d.updated_at) }); }

    const timelineHtml = messages.length > 0 || d.status === 'completed' || d.status === 'failed' ? `
      <button class="timeline-toggle" onclick="toggleTimeline('${d.dispatch_id}')">${isOpen ? 'Hide' : 'Show'} timeline (${timelineEntries.length} events)</button>
      <div class="timeline ${isOpen ? 'open' : ''}">${timelineEntries.map(e => `<div class="tl-entry"><span class="tl-time">${fmtTime(e.time)}</span><span class="tl-elapsed">${e.elapsed}</span><span class="tl-msg">${escHtml(e.msg)}</span></div>`).join('')}</div>
    ` : '';

    let durationStr;
    if (d.status === 'completed') { durationStr = 'Duration: <span class="d-duration completed">' + (d.duration_seconds ? elapsed(null, null, d.duration_seconds) : elapsed(d.created_at, d.updated_at)) + '</span>'; }
    else if (d.status === 'failed') { durationStr = 'Failed after <span class="d-duration failed">' + (d.duration_seconds ? elapsed(null, null, d.duration_seconds) : elapsed(d.created_at, d.updated_at)) + '</span>'; }
    else { durationStr = 'Running: <span class="d-duration running">' + elapsed(d.created_at) + '</span>'; }

    return `<div class="dispatch-card ${d.status}"><div class="d-top"><div class="d-top-left"><span class="d-id">${escHtml(d.dispatch_id)}</span><span>${statusIcon}</span><span class="d-ticket-id">${escHtml(d.ticket?.id || '')}</span><span class="d-title">${escHtml(d.ticket?.title || '')}</span></div><span class="status-badge ${d.status}">${d.status}</span></div><div class="d-meta"><span class="source-badge ${source}">${source === 'linear' ? 'Linear' : 'Manual'}</span><span>Agent: <span class="agent-name">${escHtml(d.agent || '\u2014')}</span> @ ${escHtml(d.machine || '\u2014')}</span><span>Dispatched: ${fmtTime(d.created_at)}</span><span>${durationStr}</span></div>${timelineHtml}</div>`;
  }).join('');
}

async function refresh() { try { const data = await api('/api/dispatches'); allDispatches = data.dispatches || []; renderDispatches(); } catch (e) {} }
refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
